<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Agro Pluse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f3f4f6;
        }
    </style>
</head>
<body class="text-gray-800 antialiased">

    <div class="min-h-screen bg-gray-100">
        <header class="bg-blue-800 text-white p-4">
            <h1 class="text-2xl font-bold">Agro Pluse Admin Panel</h1>
        </header>

        <main class="p-6">
            <div class="bg-white rounded-lg shadow p-6">
                <h2 class="text-xl font-bold mb-4">Users Overview</h2>
                <button onclick="loadUsersOverview()" class="bg-blue-800 text-white px-4 py-2 rounded mb-4">Refresh</button>
                <div id="users-overview-list" class="space-y-4">
                    <!-- Users overview will be listed here -->
                </div>
            </div>

            <div class="bg-white rounded-lg shadow p-6">
                <h2 class="text-xl font-bold mb-4">Pending Signups</h2>
                <button onclick="loadPendingUsers()" class="bg-blue-800 text-white px-4 py-2 rounded mb-4">Refresh</button>
                <div id="pending-list" class="space-y-4">
                    <!-- Pending users will be listed here -->
                </div>
            </div>

            <div class="bg-white rounded-lg shadow p-6 mt-6">
                <h2 class="text-xl font-bold mb-1">Pending Payment Checks</h2>
                <p class="text-sm text-gray-600 mb-4">Most deposits activate automatically. Only use this section if provider confirmation is delayed.</p>
                <button onclick="loadPendingDeposits()" class="bg-blue-800 text-white px-4 py-2 rounded mb-4">Refresh</button>
                <input id="pending-deposits-filter" type="text" placeholder="Filter by username, email, phone, or reference" class="w-full border border-gray-300 rounded px-3 py-2 mb-4">
                <div id="pending-deposits-list" class="space-y-4">
                    <!-- Pending deposits will be listed here -->
                </div>
            </div>

            <div class="bg-white rounded-lg shadow p-6 mt-6">
                <h2 class="text-xl font-bold mb-4">Withdrawal Requests</h2>
                <button onclick="loadWithdrawalRequests()" class="bg-blue-800 text-white px-4 py-2 rounded mb-4">Refresh</button>
                <div id="withdrawal-requests-list" class="space-y-4">
                    <!-- Withdrawal requests will be listed here -->
                </div>
            </div>

            <div class="bg-white rounded-lg shadow p-6 mt-6">
                <h2 class="text-xl font-bold mb-4">Security Logs</h2>
                <div class="flex flex-col md:flex-row gap-3 mb-4">
                    <button onclick="loadSecurityLogs()" class="bg-blue-800 text-white px-4 py-2 rounded">Refresh Logs</button>
                    <input id="security-logs-filter" type="text" placeholder="Filter by event, IP, path, method, user" class="w-full border border-gray-300 rounded px-3 py-2">
                </div>
                <div id="security-logs-list" class="space-y-3">
                    <!-- Security logs will be listed here -->
                </div>
            </div>
        </main>
    </div>

    <script>
        function formatCurrency(amount) {
            return `GH₵ ${Number(amount || 0).toFixed(2)}`;
        }

        function formatJoinedDuration(dateValue) {
            if (!dateValue) return 'Unknown';
            const joinedDate = new Date(dateValue);
            if (Number.isNaN(joinedDate.getTime())) return 'Unknown';

            const now = new Date();
            const diffMs = now - joinedDate;
            const diffDays = Math.max(0, Math.floor(diffMs / (1000 * 60 * 60 * 24)));

            if (diffDays < 1) return 'Today';
            if (diffDays === 1) return '1 day';
            if (diffDays < 30) return `${diffDays} days`;

            const diffMonths = Math.floor(diffDays / 30);
            if (diffMonths === 1) return '1 month';
            if (diffMonths < 12) return `${diffMonths} months`;

            const diffYears = Math.floor(diffMonths / 12);
            return diffYears === 1 ? '1 year' : `${diffYears} years`;
        }

        function loadUsersOverview() {
            fetch('/api/admin/users-overview')
            .then(async (response) => {
                if (!response.ok) {
                    throw new Error(`Failed to load users overview (HTTP ${response.status})`);
                }
                return response.json();
            })
            .then(data => {
                const list = document.getElementById('users-overview-list');
                list.innerHTML = '';

                const users = data.users || [];
                if (users.length === 0) {
                    list.innerHTML = '<p class="text-gray-500">No users found.</p>';
                    return;
                }

                users.forEach(user => {
                    const userDiv = document.createElement('div');
                    userDiv.className = 'border p-4 rounded';
                    const joinedOn = user.created_at ? new Date(user.created_at).toLocaleString() : 'Unknown';
                    const joinedDuration = formatJoinedDuration(user.created_at);
                    userDiv.innerHTML = `
                        <div class="grid md:grid-cols-2 gap-3">
                            <div>
                                <p><strong>Name:</strong> ${user.name || '-'}</p>
                                <p><strong>Email:</strong> ${user.email || '-'}</p>
                                <p><strong>Phone:</strong> ${user.phone || '-'}</p>
                                <p><strong>Status:</strong> ${user.status || '-'}</p>
                            </div>
                            <div>
                                <p><strong>Joined On:</strong> ${joinedOn}</p>
                                <p><strong>Member For:</strong> ${joinedDuration}</p>
                                <p><strong>Total Deposited:</strong> ${formatCurrency(user.total_deposited)}</p>
                                <p><strong>Approved Deposits:</strong> ${formatCurrency(user.approved_total_deposited)}</p>
                                <p><strong>Pending Deposits:</strong> ${formatCurrency(user.pending_total_deposited)}</p>
                                <p><strong>Deposit Count:</strong> ${Number(user.deposit_count || 0)}</p>
                            </div>
                        </div>
                    `;
                    list.appendChild(userDiv);
                });
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('users-overview-list').innerHTML = '<p class="text-red-500">Failed to load users overview. Please refresh this page (Ctrl+F5) and try again.</p>';
            });
        }

        // Load pending users
        function loadPendingUsers() {
            fetch('/api/pending')
            .then(response => response.json())
            .then(data => {
                const list = document.getElementById('pending-list');
                list.innerHTML = '';

                const users = data.users || [];
                if (users.length === 0) {
                    list.innerHTML = '<p class="text-gray-500">No pending signups.</p>';
                    return;
                }

                users.forEach(user => {
                    const userDiv = document.createElement('div');
                    userDiv.className = 'border p-4 rounded flex justify-between items-center';
                    userDiv.innerHTML = `
                        <div>
                            <p><strong>Name:</strong> ${user.name}</p>
                            <p><strong>Email:</strong> ${user.email}</p>
                            <p><strong>Phone:</strong> ${user.phone}</p>
                        </div>
                        <div>
                            <button onclick="approveUser(${user.id})" class="bg-blue-800 text-white px-4 py-2 rounded mr-2">Approve</button>
                            <button onclick="rejectUser(${user.id})" class="bg-red-600 text-white px-4 py-2 rounded">Reject</button>
                        </div>
                    `;
                    list.appendChild(userDiv);
                });
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('pending-list').innerHTML = '<p class="text-red-500">Failed to load pending users. Ensure server is running.</p>';
            });
        }

        function approveUser(id) {
            fetch(`/api/approve/${id}`, { method: 'POST' })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('User approved!');
                    loadPendingUsers();
                } else {
                    alert('Error approving user');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Approval failed. Ensure server is running.');
            });
        }

        function rejectUser(id) {
            fetch(`/api/reject/${id}`, { method: 'POST' })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('User rejected!');
                    loadPendingUsers();
                } else {
                    alert('Error rejecting user');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Rejection failed. Ensure server is running.');
            });
        }

        function loadPendingDeposits() {
            fetch('/api/admin/pending-deposits')
            .then(response => response.json())
            .then(data => {
                const list = document.getElementById('pending-deposits-list');
                list.innerHTML = '';

                const filterValue = (document.getElementById('pending-deposits-filter').value || '').toLowerCase().trim();
                const deposits = (data.deposits || []).filter((deposit) => {
                    if (!filterValue) return true;
                    const searchable = [
                        deposit.user_name,
                        deposit.user_email,
                        deposit.mobile_number,
                        deposit.payment_reference,
                        deposit.plan_name
                    ].map((v) => String(v || '').toLowerCase()).join(' ');
                    return searchable.includes(filterValue);
                });
                if (deposits.length === 0) {
                    list.innerHTML = '<p class="text-gray-500">No pending payment checks.</p>';
                    return;
                }

                deposits.forEach(deposit => {
                    const depositDiv = document.createElement('div');
                    depositDiv.className = 'border p-4 rounded flex justify-between items-center gap-4';
                    depositDiv.innerHTML = `
                        <div>
                            <p><strong>User:</strong> ${deposit.user_name} (${deposit.user_email})</p>
                            <p><strong>Plan:</strong> ${deposit.plan_name}</p>
                            <p><strong>Amount:</strong> GH₵ ${Number(deposit.amount || 0).toFixed(2)}</p>
                            <p><strong>Provider:</strong> ${deposit.payment_provider || 'Manual'}</p>
                            <p><strong>Mobile Number:</strong> ${deposit.mobile_number || '-'}</p>
                            <p><strong>Reference:</strong> ${deposit.payment_reference || '-'}</p>
                        </div>
                        <div class="shrink-0">
                            <button onclick="approveDeposit(${deposit.id})" class="bg-blue-800 text-white px-4 py-2 rounded mr-2">Mark Active</button>
                            <button onclick="rejectDeposit(${deposit.id})" class="bg-red-600 text-white px-4 py-2 rounded">Mark Failed</button>
                        </div>
                    `;
                    list.appendChild(depositDiv);
                });
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('pending-deposits-list').innerHTML = '<p class="text-red-500">Failed to load pending payment checks.</p>';
            });
        }

        function approveDeposit(id) {
            fetch(`/api/admin/approve-deposit/${id}`, { method: 'POST' })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('Deposit marked active. The 7-day timer starts from approval time.');
                    loadPendingDeposits();
                } else {
                    alert(data.message || 'Error approving deposit');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Approval failed. Ensure server is running.');
            });
        }

        function rejectDeposit(id) {
            fetch(`/api/admin/reject-deposit/${id}`, { method: 'POST' })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('Deposit marked failed.');
                    loadPendingDeposits();
                } else {
                    alert(data.message || 'Error rejecting deposit');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Rejection failed. Ensure server is running.');
            });
        }

        function loadWithdrawalRequests() {
            fetch('/api/admin/withdrawal-requests')
            .then(response => response.json())
            .then(data => {
                const list = document.getElementById('withdrawal-requests-list');
                list.innerHTML = '';

                const requests = data.requests || [];
                if (requests.length === 0) {
                    list.innerHTML = '<p class="text-gray-500">No withdrawal requests yet.</p>';
                    return;
                }

                requests.forEach((request) => {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'border p-4 rounded';
                    const statusClass = request.status === 'approved'
                        ? 'text-green-700 bg-green-50 border-green-200'
                        : request.status === 'rejected'
                            ? 'text-red-700 bg-red-50 border-red-200'
                            : 'text-amber-700 bg-amber-50 border-amber-200';
                    const requestedAt = request.requested_at ? new Date(request.requested_at).toLocaleString() : '-';
                    const processedAt = request.processed_at ? new Date(request.processed_at).toLocaleString() : '-';

                    wrapper.innerHTML = `
                        <div class="flex flex-col lg:flex-row lg:items-start lg:justify-between gap-4">
                            <div>
                                <p><strong>User:</strong> ${request.user_name} (${request.user_email})</p>
                                <p><strong>Plan:</strong> ${request.plan_name}</p>
                                <p><strong>Payout Amount:</strong> ${formatCurrency(request.payout_amount)}</p>
                                <p><strong>Destination:</strong> ${request.provider_name} - ${request.account_name} (${request.account_number})</p>
                                <p><strong>Requested:</strong> ${requestedAt}</p>
                                <p><strong>Status:</strong> <span class="inline-flex text-xs border rounded-full px-2 py-1 ${statusClass}">${request.status}</span></p>
                                ${request.note ? `<p><strong>User Note:</strong> ${request.note}</p>` : ''}
                                ${request.admin_note ? `<p><strong>Admin Note:</strong> ${request.admin_note}</p>` : ''}
                                ${request.processed_at ? `<p><strong>Processed:</strong> ${processedAt}</p>` : ''}
                            </div>
                            ${request.status === 'pending' ? `
                                <div class="shrink-0 flex flex-col gap-2">
                                    <button onclick="approveWithdrawal(${request.id})" class="bg-green-600 text-white px-4 py-2 rounded">Confirm Manual Payment</button>
                                    <button onclick="rejectWithdrawal(${request.id})" class="bg-red-600 text-white px-4 py-2 rounded">Reject</button>
                                </div>
                            ` : ''}
                        </div>
                    `;
                    list.appendChild(wrapper);
                });
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('withdrawal-requests-list').innerHTML = '<p class="text-red-500">Failed to load withdrawal requests.</p>';
            });
        }

        function approveWithdrawal(id) {
            const adminNote = window.prompt('Optional note after you have paid manually:', '') || '';
            fetch(`/api/admin/approve-withdrawal/${id}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ adminNote })
            })
            .then(response => response.json())
            .then(data => {
                if (!data.success) {
                    alert(data.message || 'Failed to approve withdrawal.');
                    return;
                }

                alert(data.message || 'Manual payment recorded.');
                loadWithdrawalRequests();
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Failed to approve withdrawal.');
            });
        }

        function rejectWithdrawal(id) {
            const adminNote = window.prompt('Reason for rejection:', '') || '';
            fetch(`/api/admin/reject-withdrawal/${id}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ adminNote })
            })
            .then(response => response.json())
            .then(data => {
                if (!data.success) {
                    alert(data.message || 'Failed to reject withdrawal.');
                    return;
                }

                alert(data.message || 'Withdrawal rejected.');
                loadWithdrawalRequests();
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Failed to reject withdrawal.');
            });
        }

        function loadSecurityLogs() {
            fetch('/api/admin/security-logs?limit=200')
            .then(response => response.json())
            .then(data => {
                const list = document.getElementById('security-logs-list');
                list.innerHTML = '';

                const filterValue = (document.getElementById('security-logs-filter').value || '').toLowerCase().trim();
                const logs = (data.logs || []).filter((entry) => {
                    if (!filterValue) return true;
                    const searchable = [
                        entry.event,
                        entry.ip,
                        entry.path,
                        entry.method,
                        JSON.stringify(entry.details || {})
                    ].map((v) => String(v || '').toLowerCase()).join(' ');
                    return searchable.includes(filterValue);
                });

                if (logs.length === 0) {
                    list.innerHTML = '<p class="text-gray-500">No security logs yet.</p>';
                    return;
                }

                logs.forEach((entry) => {
                    const row = document.createElement('div');
                    row.className = 'border rounded p-3 bg-slate-50';
                    const when = entry.ts ? new Date(entry.ts).toLocaleString() : 'Unknown time';
                    const details = entry.details && Object.keys(entry.details).length
                        ? JSON.stringify(entry.details)
                        : '-';

                    row.innerHTML = `
                        <p><strong>Time:</strong> ${when}</p>
                        <p><strong>Event:</strong> ${entry.event || '-'}</p>
                        <p><strong>IP:</strong> ${entry.ip || '-'}</p>
                        <p><strong>Method/Path:</strong> ${(entry.method || '-')} ${(entry.path || '-')}</p>
                        <p><strong>Details:</strong> ${details}</p>
                    `;
                    list.appendChild(row);
                });
            })
            .catch((error) => {
                console.error('Error:', error);
                document.getElementById('security-logs-list').innerHTML = '<p class="text-red-500">Failed to load security logs.</p>';
            });
        }

        // Load on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadUsersOverview();
            loadPendingUsers();
            loadPendingDeposits();
            loadWithdrawalRequests();
            loadSecurityLogs();
            document.getElementById('pending-deposits-filter').addEventListener('input', loadPendingDeposits);
            document.getElementById('security-logs-filter').addEventListener('input', loadSecurityLogs);
        });
    </script>
</body>
</html>
