services:
  - type: web
    name: agro-pluse
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    disks:
      - name: agro-data
        mountPath: /opt/render/project/src/data
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_PATH
        value: /opt/render/project/src/data/users.db
