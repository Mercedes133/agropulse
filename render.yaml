services:
  - type: web
    name: agro-pluse
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    disks:
      - name: agro-data
        mountPath: /opt/render/project/src/data
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_PATH
        value: /opt/render/project/src/data/users.db
      - key: ADMIN_USERNAME
        value: CHANGE_ME
      - key: ADMIN_PASSWORD
        value: CHANGE_ME
      - key: PAYSTACK_SECRET_KEY
        value: CHANGE_ME
      - key: PAYSTACK_PUBLIC_KEY
        value: CHANGE_ME
